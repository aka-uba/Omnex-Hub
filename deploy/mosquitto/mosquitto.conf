# ========================================
# Omnex Display Hub - Mosquitto MQTT Broker
# Eclipse Mosquitto 2.x Configuration
# ========================================

# ---- Listener ----
# Internal listener (Docker network only)
listener 1883 0.0.0.0

# WebSocket listener (for browser-based MQTT clients)
listener 9001 0.0.0.0
protocol websockets

# ---- Authentication ----
# Require username/password
allow_anonymous false
password_file /mosquitto/config/passwd

# ---- Access Control ----
acl_file /mosquitto/config/acl

# ---- Persistence ----
persistence true
persistence_location /mosquitto/data/

# ---- Logging ----
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
connection_messages true

# ---- Performance ----
max_connections -1
max_inflight_messages 200
max_queued_messages 1000
message_size_limit 262144

# ---- Keep Alive ----
max_keepalive 120
