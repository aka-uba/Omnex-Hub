# ========================================
# Omnex Display Hub - Base Docker Compose
# Core Services: PostgreSQL + App
# ========================================
#
# This is the BASE stack. Use with an overlay for production:
#
#   Standalone (single server, built-in nginx):
#     docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
#
#   Multi-project (behind shared Traefik proxy):
#     docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
#
#   Local testing:
#     docker compose -f docker-compose.local.yml up -d
#
# IMPORTANT: Set COMPOSE_PROJECT_NAME in .env for multi-project isolation.
# Each stack must have a unique project name and APP_PORT.
# ========================================

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OMNEX_DB_NAME:-omnex_hub}
      POSTGRES_USER: ${OMNEX_DB_USER:-omnex}
      POSTGRES_PASSWORD: ${OMNEX_DB_PASS:?Database password is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OMNEX_DB_USER:-omnex} -d ${OMNEX_DB_NAME:-omnex_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      internal:

  # ---- PHP Application (Apache) ----
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OMNEX_DB_DRIVER: pgsql
      OMNEX_DB_HOST: postgres
      OMNEX_DB_PORT: 5432
      OMNEX_DB_NAME: ${OMNEX_DB_NAME:-omnex_hub}
      OMNEX_DB_USER: ${OMNEX_DB_USER:-omnex}
      OMNEX_DB_PASS: ${OMNEX_DB_PASS:?Database password is required}
      OMNEX_PRODUCTION: "true"
      OMNEX_JWT_SECRET: ${OMNEX_JWT_SECRET:?JWT secret is required}
      OMNEX_ADMIN_EMAIL: ${OMNEX_ADMIN_EMAIL:-admin@omnex.local}
      OMNEX_ADMIN_PASSWORD: ${OMNEX_ADMIN_PASSWORD:-}
      OMNEX_FORCE_HTTPS: ${OMNEX_FORCE_HTTPS:-false}
      OMNEX_SKIP_CSRF: ${OMNEX_SKIP_CSRF:-false}
    volumes:
      - app_storage:/var/www/html/storage
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      internal:

volumes:
  postgres_data:
    driver: local
  app_storage:
    driver: local

networks:
  internal:
    driver: bridge
