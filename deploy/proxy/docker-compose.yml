# ========================================
# Omnex Display Hub - Shared Reverse Proxy (Traefik)
# Manages routing and SSL for all project stacks
# ========================================
#
# Usage:
#   cd deploy/proxy
#   cp .env.example .env   # Configure ACME_EMAIL and DASHBOARD_AUTH
#   docker compose up -d
#
# This runs once per server and routes traffic to all stacks.
# Each app stack connects via the shared 'omnex-proxy' network.
#
# Dashboard: https://traefik.${PROXY_DOMAIN}/dashboard/
# ========================================

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    mem_limit: 512m
    command:
      # ---- API / Dashboard ----
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # ---- Docker Provider ----
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=omnex-proxy"

      # ---- File Provider (optional manual overrides) ----
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # ---- Entrypoints ----
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # ---- HTTP -> HTTPS redirect ----
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # ---- Let's Encrypt ----
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

      # ---- Logging ----
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
      - "--accesslog=${TRAEFIK_ACCESS_LOG:-false}"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - omnex-proxy
    labels:
      # ---- Dashboard Router ----
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${PROXY_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

      # ---- Dashboard Auth ----
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${DASHBOARD_AUTH:?DASHBOARD_AUTH is required}"

      # ---- Global Compression ----
      - "traefik.http.middlewares.compress.compress=true"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  traefik_letsencrypt:
    driver: local
  traefik_logs:
    driver: local

networks:
  omnex-proxy:
    name: omnex-proxy
    driver: bridge
