# ========================================
# Omnex Display Hub - Multi-Project Mode Overlay (Traefik)
# Adds Traefik labels + shared proxy network to app service
# ========================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
#
# Prerequisites:
#   1. Shared proxy must be running: cd proxy && docker compose up -d
#   2. OMNEX_DOMAIN must be set in .env
#   3. COMPOSE_PROJECT_NAME must be unique per stack
#
# Each stack gets:
#   - Automatic HTTPS via Let's Encrypt (Traefik manages certificates)
#   - Domain-based routing (Host header matching)
#   - Rate limiting and security headers
#   - Isolated internal network + shared proxy network
# ========================================

services:
  app:
    labels:
      # ---- Traefik Service Discovery ----
      - "traefik.enable=true"

      # ---- HTTPS Router ----
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-omnex}.rule=Host(`${OMNEX_DOMAIN:?OMNEX_DOMAIN is required}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-omnex}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-omnex}.tls.certresolver=letsencrypt"

      # ---- Load Balancer ----
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-omnex}.loadbalancer.server.port=80"

      # ---- Network ----
      - "traefik.docker.network=omnex-proxy"

      # ---- Rate Limiting ----
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-ratelimit.ratelimit.period=1s"

      # ---- Security Headers ----
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.stsSeconds=15768000"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-omnex}-headers.headers.referrerPolicy=strict-origin-when-cross-origin"

      # ---- Middleware Chain ----
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-omnex}.middlewares=${COMPOSE_PROJECT_NAME:-omnex}-ratelimit,${COMPOSE_PROJECT_NAME:-omnex}-headers"
    networks:
      internal:
      omnex-proxy:

networks:
  omnex-proxy:
    external: true
    name: omnex-proxy
