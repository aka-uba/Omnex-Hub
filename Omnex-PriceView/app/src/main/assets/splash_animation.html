<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:transparent;display:flex;align-items:center;justify-content:center}
.logo-wrap{width:70vmin;height:70vmin;position:relative}

  .omnex-logo {
    --logo-size: 260px;
    --filter: none;
    --accent: #24e2ea;
    position: relative;
    width: var(--logo-size);
    height: var(--logo-size);
  }
  .omnex-logo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    filter: var(--filter);
    opacity: 0; /* Mask dönüşümüne kadar gizle — flash önleme */
  }
  .omnex-logo img[data-masked="1"] { display: none; } /* Dönüşüm sonrası gizli kalır */

  .omnex-logo .part {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: var(--logo-main, #24e2ea);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,.14));
    opacity: 0; /* Renkler uygulanana kadar gizle — flash önleme */
    transition: none;
  }
  .omnex-logo.colors-ready .part { opacity: 1; }
  /* SVG vector part'lar mask/background kullanmaz */
  .omnex-logo .svg-part {
    background: none !important;
    -webkit-mask-image: none !important;
    mask-image: none !important;
    opacity: 0;
  }
  .omnex-logo.colors-ready .svg-part { opacity: 1; }
  .omnex-logo .body.svg-part { z-index: 1; }
  .omnex-logo .slice1.svg-part { z-index: 4; }
  .omnex-logo .slice2.svg-part { z-index: 5; }
  .omnex-logo .slice3.svg-part { z-index: 6; }
  /* Animasyonlu dilimlerde opacity animasyon kontrol etsin */
  .omnex-logo.animated.colors-ready .slice1.part,
  .omnex-logo.animated.colors-ready .slice2.part,
  .omnex-logo.animated.colors-ready .slice3.part { opacity: unset; }
  /* SVG part'lar da animasyona dahil */
  .omnex-logo.animated.colors-ready .slice1.svg-part,
  .omnex-logo.animated.colors-ready .slice2.svg-part,
  .omnex-logo.animated.colors-ready .slice3.svg-part { opacity: unset; }
  .omnex-logo .body.part { z-index: 1; }
  .omnex-logo .slice1.part { z-index: 4; }
  .omnex-logo .slice2.part { z-index: 5; }
  .omnex-logo .slice3.part { z-index: 6; }

  .omnex-logo .body { z-index: 1; }
  .omnex-logo .slice1 { z-index: 4; }
  .omnex-logo .slice2 { z-index: 5; }
  .omnex-logo .slice3 { z-index: 6; }

  .omnex-logo .inner {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .omnex-logo .inner svg {
    width: 40%;
    height: 40%;
    fill: var(--accent);
    stroke: var(--accent);
    stroke-width: 1.8;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,.18));
  }

  /* Assembly animation: slices enter from right sequentially, then icon appears */
  /* Animasyonu sadece .part div'lere uygula — ham img'ye değil (flash önleme) */
  .animated .slice1.part { animation: sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 0s both; }
  .animated .slice2.part { animation: sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 0.5s both; }
  .animated .slice3.part { animation: sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 1.0s both; }
  /* Ham img asla animasyon almasın */
  .animated img.slice1, .animated img.slice2, .animated img.slice3 { animation: none !important; opacity: 0 !important; }
  .animated .inner:not(.price-inner-anim):not(.gw-inner-anim):not(.hub-inner-anim):not(.player-inner-anim) svg { animation: iconReveal 0.8s cubic-bezier(.16,1,.3,1) 1.6s both; }

  /* Slice enters from far right, slides left into position */
  @keyframes sliceEnter {
    0% { transform: translateX(120px) translateY(0); opacity: 0; }
    40% { opacity: 1; }
    100% { transform: translateX(0) translateY(0); opacity: 1; }
  }

  /* Subtle idle breathing after assembly */
  @keyframes sliceBreathe {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(4px) translateY(-1px); }
  }

  /* Icon scales up from tiny + fades in after all slices land */
  @keyframes iconReveal {
    0% { transform: scale(0.2); opacity: 0; }
    60% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Subtle icon pulse after reveal */
  @keyframes iconPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: .95; }
  }

.omnex-logo:not(.animated) .price-inner-anim .price-phase-player { opacity: 0; }
.omnex-logo:not(.animated) .price-inner-anim .price-phase-scan { opacity: 1; }
.omnex-logo:not(.animated) .price-inner-anim .price-scanline { opacity: 0.85; transform: translateY(11px); }

.price-inner-anim {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
}
.price-inner-anim svg {
  position: absolute;
  width: 33%;
  height: 33%;
  fill: var(--accent);
  stroke: var(--accent);
  stroke-width: 1.8;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,.18));
}

/* Phase 1: Player icon - appears, stays, then implodes inward */
.price-phase-player {
  opacity: 0;
}
.animated .price-phase-player {
  animation: pricePlayerIn 0.4s cubic-bezier(.16,1,.3,1) 1.2s both,
             pricePlayerImplode 0.4s cubic-bezier(.55,.06,.68,.19) 1.8s both;
}

/* Phase 2: Scan icon - hidden until player gone, then scales in */
.price-phase-scan {
  opacity: 0;
}
.animated .price-phase-scan {
  animation: priceScanAppear 0.5s cubic-bezier(.16,1,.3,1) 2.3s both;
}

/* Scan beam line sweeps top to bottom */
.price-scanline {
  opacity: 0;
}
.animated .price-scanline {
  animation: priceScanBeam 2s ease-in-out 2.9s both;
}

/* Player appears (scale from small + fade in) */
@keyframes pricePlayerIn {
  0%   { opacity: 0; transform: scale(0.2); }
  60%  { opacity: 1; transform: scale(1.1); }
  100% { opacity: 1; transform: scale(1); }
}

/* Player implodes inward (shrinks + spins + fades) */
@keyframes pricePlayerImplode {
  0%   { opacity: 1; transform: scale(1) rotate(0deg); filter: drop-shadow(0 8px 18px rgba(0,0,0,.18)); }
  40%  { opacity: 0.8; transform: scale(1.15) rotate(-8deg); filter: drop-shadow(0 0 20px rgba(36,226,234,.5)); }
  100% { opacity: 0; transform: scale(0) rotate(180deg); filter: drop-shadow(0 0 0 transparent); }
}

/* Scan icon scales in from nothing */
@keyframes priceScanAppear {
  0%   { opacity: 0; transform: scale(0.15) rotate(-20deg); }
  50%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* Scan beam: top -> bottom -> back to center, then stops */
@keyframes priceScanBeam {
  0%   { opacity: 0; transform: translateY(0); }
  8%   { opacity: 0.95; }
  45%  { opacity: 0.95; transform: translateY(22px); }
  55%  { opacity: 0.95; transform: translateY(22px); }
  90%  { opacity: 0.95; transform: translateY(11px); }
  100% { opacity: 0.85; transform: translateY(11px); }
}

/* Splash override: beyaz logo, tam boyut, ortalanmis */
.omnex-logo{width:100%!important;height:100%!important}
.omnex-logo .part{background:#FFFFFF !important}
.price-inner-anim svg{fill:#FFFFFF!important;stroke:#FFFFFF!important}
/* Play ikonu gizle - sadece barkod tarayici goster */
.price-phase-player{display:none!important}
.price-phase-scan{opacity:1!important}
</style>
</head>

<script>
function convertLogoImagesToMasks(){
  document.querySelectorAll(".omnex-logo img").forEach(function(img){
    if(img.dataset.masked==="1") return;
    var part=document.createElement("div");
    part.className=img.className+" part";
    part.style.webkitMaskImage="url(\""+img.src+"\")";
    part.style.maskImage="url(\""+img.src+"\")";
    part.style.webkitMaskRepeat="no-repeat";
    part.style.maskRepeat="no-repeat";
    part.style.webkitMaskPosition="center";
    part.style.maskPosition="center";
    part.style.webkitMaskSize="contain";
    part.style.maskSize="contain";
    img.parentNode.insertBefore(part,img);
    img.style.display="none";
    img.dataset.masked="1";
  });
}
window.addEventListener("load",function(){
  convertLogoImagesToMasks();
  document.querySelectorAll(".omnex-logo").forEach(function(el){
    el.classList.add("colors-ready");
  });
});
</script>
