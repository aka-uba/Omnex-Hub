<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:transparent;display:flex;align-items:center;justify-content:center}
.logo-wrap{width:70vmin;height:70vmin;min-width:180px;min-height:180px;max-width:340px;max-height:340px;position:relative}

.omnex-logo{position:relative;width:100%;height:100%}
.omnex-logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none;-webkit-user-drag:none;filter:brightness(0) invert(1) drop-shadow(0 8px 18px rgba(0,0,0,.14));opacity:1}
.omnex-logo .body{z-index:1}
.omnex-logo .slice1{z-index:4}
.omnex-logo .slice2{z-index:5}
.omnex-logo .slice3{z-index:6}

.omnex-logo .inner{position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center}
.price-inner-anim svg{position:absolute;width:41%;height:41%;fill:#FFFFFF;stroke:#FFFFFF;stroke-width:1.8;filter:drop-shadow(0 8px 18px rgba(0,0,0,.18))}

.animated .slice1{animation:sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 0s both,sliceIdle 3.0s ease-in-out 2.0s infinite}
.animated .slice2{animation:sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 0.5s both,sliceIdle 3.0s ease-in-out 2.2s infinite}
.animated .slice3{animation:sliceEnter 0.7s cubic-bezier(.16,1,.3,1) 1.0s both,sliceIdle 3.0s ease-in-out 2.4s infinite}

.price-phase-player{opacity:0}
.animated .price-phase-player{animation:pricePlayerIn 0.4s cubic-bezier(.16,1,.3,1) 1.2s both,pricePlayerImplode 0.4s cubic-bezier(.55,.06,.68,.19) 1.8s both}
.price-phase-scan{opacity:1}
.animated .price-phase-scan{animation:priceScanAppear 0.5s cubic-bezier(.16,1,.3,1) 2.3s both}
.price-scanline{opacity:0}
.animated .price-scanline{animation:priceScanBeam 2s ease-in-out 2.9s both}

@keyframes sliceEnter{
  0%{transform:translateX(120px);opacity:0}
  40%{opacity:1}
  100%{transform:translateX(0);opacity:1}
}
@keyframes sliceIdle{
  0%{transform:translateX(0)}
  50%{transform:translateX(2px)}
  100%{transform:translateX(0)}
}
@keyframes pricePlayerIn{
  0%{opacity:0;transform:scale(.2)}
  60%{opacity:1;transform:scale(1.1)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes pricePlayerImplode{
  0%{opacity:1;transform:scale(1) rotate(0deg)}
  40%{opacity:.8;transform:scale(1.15) rotate(-8deg)}
  100%{opacity:0;transform:scale(0) rotate(180deg)}
}
@keyframes priceScanAppear{
  0%{opacity:0;transform:scale(.15) rotate(-20deg)}
  50%{opacity:1;transform:scale(1.08) rotate(2deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}
@keyframes priceScanBeam{
  0%{opacity:0;transform:translateY(0)}
  8%{opacity:.95}
  45%{opacity:.95;transform:translateY(22px)}
  55%{opacity:.95;transform:translateY(22px)}
  90%{opacity:.95;transform:translateY(11px)}
  100%{opacity:.85;transform:translateY(11px)}
}
</style>
</head>
<body>
  <div class="logo-wrap">
    <div id="logoPrice" class="omnex-logo logo-price animated">
      <img class="body" src="file:///android_asset/splash_logo_body.png" alt="">
      <img class="slice1" src="file:///android_asset/splash_logo_slice1.png" alt="">
      <img class="slice2" src="file:///android_asset/splash_logo_slice2.png" alt="">
      <img class="slice3" src="file:///android_asset/splash_logo_slice3.png" alt="">
      <div class="inner price-inner-anim">
        <svg class="price-phase-player" viewBox="0 0 64 64">
          <polygon points="24,16 50,32 24,48" fill="#FFFFFF"></polygon>
        </svg>
        <svg class="price-phase-scan" viewBox="0 0 64 64">
          <line stroke="#FFFFFF" x1="16" y1="16" x2="26" y2="16" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="16" y1="16" x2="16" y2="26" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="48" y1="16" x2="38" y2="16" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="48" y1="16" x2="48" y2="26" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="16" y1="48" x2="26" y2="48" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="16" y1="48" x2="16" y2="38" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="48" y1="48" x2="38" y2="48" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="48" y1="48" x2="48" y2="38" fill="none" stroke-width="2.4"></line>
          <line stroke="#FFFFFF" x1="22" y1="22" x2="22" y2="44" stroke-width="2.6"></line>
          <line stroke="#FFFFFF" x1="26" y1="22" x2="26" y2="44" stroke-width="1.6"></line>
          <line stroke="#FFFFFF" x1="29.5" y1="22" x2="29.5" y2="44" stroke-width="3"></line>
          <line stroke="#FFFFFF" x1="33.5" y1="22" x2="33.5" y2="44" stroke-width="1.4"></line>
          <line stroke="#FFFFFF" x1="37" y1="22" x2="37" y2="44" stroke-width="2.2"></line>
          <line stroke="#FFFFFF" x1="40.5" y1="22" x2="40.5" y2="44" stroke-width="1.8"></line>
          <line stroke="#FFFFFF" x1="43.5" y1="22" x2="43.5" y2="44" stroke-width="2"></line>
          <line stroke="#FFFFFF" class="price-scanline" x1="14" y1="22" x2="50" y2="22" stroke-width="2.2" stroke-opacity="0.95"></line>
        </svg>
      </div>
    </div>
  </div>
<script>
window.addEventListener('load', function(){
  var logo=document.getElementById('logoPrice');
  requestAnimationFrame(function(){ logo.classList.add('animated'); });
});
</script>
</body>
</html>
