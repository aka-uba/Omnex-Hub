<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PriceView - Kitap / Kirtasiye - Urun Bulunamadi</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .pv-barcode-truncate{max-width:15ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}
  html, body { font-family:'Roboto',Arial,Helvetica,sans-serif; background:transparent !important; background-color:transparent !important; padding:0 !important;  }
  /* Mobile responsive */
  /* Mobile responsive - comprehensive */
  @media (max-width:768px) {
    .pv-card { padding:14px !important; }
    .pv-card-inner { padding:20px !important; gap:12px !important; }
    .pv-img-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-text-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-price { font-size:42px !important; }
    .pv-title { font-size:26px !important; }
    .pv-grid-bottom { grid-template-columns:1fr !important; }
    /* Description */
    [data-bind="description"] { font-size:15px !important; }
    /* Brand */
    [data-bind="brand"] { font-size:13px !important; }
    /* Barcode */
    [data-bind="barcode"] { font-size:17px !important; letter-spacing:1px !important; }
    /* Badge pills */
    [style*="border-radius:999px"] { font-size:11px !important; padding:7px 10px !important; }
    /* KDV, Vadeli pills */
    [style*="border-radius:14px"] { font-size:13px !important; padding:7px 10px !important; }
    /* Old price */
    [data-bind="previous_price"] { font-size:17px !important; }
    /* Currency symbol */
    [style*="font-size:26px"][style*="font-weight:800"] { font-size:20px !important; }
    /* Header company/branch */
    [data-bind="company_name"] { font-size:20px !important; }
    [data-bind="branch_name"] { font-size:15px !important; }
    /* Barcode label */
    [style*="letter-spacing:1.4px"][style*="text-transform:uppercase"] { font-size:10px !important; }
    /* Close button */
    [title="Kapat"] { width:30px !important; height:30px !important; font-size:14px !important; }
    /* Fallback icon */
    .pv-missing-image-dot { width:160px !important; height:160px !important; font-size:80px !important; }
    .pv-img-area.pv-missing-image-mode { min-height:240px !important; padding:16px 0 !important; }
    /* Print button */
    [onclick*="printSection"] { font-size:12px !important; padding:10px 14px !important; min-width:140px !important; }
    /* Grid info boxes */
    .pv-grid-bottom > div { padding:10px !important; }
    .pv-grid-bottom [style*="font-size:22px"] { font-size:17px !important; }
  }
  @media (max-width:480px) {
    .pv-card { padding:14px !important; }
    .pv-card-inner { padding:16px !important; gap:10px !important; }
    .pv-price { font-size:32px !important; }
    .pv-title { font-size:22px !important; }
    [data-bind="description"] { font-size:13px !important; }
    [data-bind="brand"] { font-size:11px !important; }
    [data-bind="barcode"] { font-size:15px !important; }
    [data-bind="previous_price"] { font-size:14px !important; }
    [data-bind="company_name"] { font-size:16px !important; }
    [data-bind="branch_name"] { font-size:12px !important; }
    [style*="border-radius:14px"] { font-size:11px !important; padding:6px 8px !important; }
    [style*="font-size:26px"][style*="font-weight:800"] { font-size:16px !important; }
    .pv-missing-image-dot { width:120px !important; height:120px !important; font-size:60px !important; }
    .pv-img-area.pv-missing-image-mode { min-height:240px !important; padding:14px 0 !important; }
    /* Not-found heading */
    [style*="font-size:42px"] { font-size:26px !important; }
    [style*="font-size:44px"] { font-size:26px !important; }
    /* Not-found description */
    [style*="font-size:20px"][style*="font-weight:600"] { font-size:14px !important; }
    /* Info card emoji */
    [style*="font-size:110px"] { font-size:70px !important; }
    [style*="font-size:100px"] { font-size:60px !important; }
    [style*="font-size:108px"] { font-size:70px !important; }
    /* Prevent text overflow */
    .pv-card-inner { overflow:hidden !important; word-break:break-word !important; }
  }
  @media (max-width:360px) {
    .pv-price { font-size:28px !important; }
    .pv-title { font-size:18px !important; }
    [data-bind="company_name"] { font-size:14px !important; }
    [data-bind="branch_name"] { font-size:11px !important; }
    [data-bind="description"] { font-size:12px !important; }
  }
</style>
</head>
<body>
<div class="pv-card" style="border-radius:28px;padding:22px;background:linear-gradient(145deg,#78350f 0%,#1f2937 100%);box-shadow:0 20px 48px rgba(0,0,0,.35);">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;">
        <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;"><span data-bind="company_name" style="font-size:22px;font-weight:900;color:#fff;">Firma Adı</span><span style="color:rgba(255,255,255,.25);font-size:14px;font-weight:300;">•</span><span data-bind="branch_name" style="font-size:16px;font-weight:700;color:rgba(255,255,255,.55);">Şube Adı</span></div>
        <button onclick="event.stopPropagation()" title="Kapat" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:rgba(255,255,255,.65);font-size:18px;font-weight:700;line-height:1;flex-shrink:0;">&#10005;</button>
      </div>
      <div class="pv-card-inner" style="display:flex;gap:20px;flex-wrap:wrap;min-height:260px;border-radius:28px;padding:32px;background:linear-gradient(135deg,#fffbeb 0%,#ffffff 100%);align-items:center;">
        <div class="pv-img-area" style="flex:0.8 1 240px;display:flex;justify-content:center;">
          <div style="width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#fde68a 0%,#fef3c7 48%,rgba(254,243,199,.2) 70%);display:flex;align-items:center;justify-content:center;font-size:108px;">❔</div>
        </div>
        <div class="pv-text-area" style="flex:1.2 1 500px;">
          <div style="display:inline-block;padding:10px 14px;border-radius:999px;background:#fffbeb;border:1px solid #fbbf24;color:#92400e;font-size:13px;font-weight:900;">Arama Sonucu</div>
          <div style="margin-top:16px;font-size:42px;line-height:1.05;font-weight:900;color:#78350f;">Ürün bulunamadı</div>
          <div style="margin-top:12px;font-size:20px;line-height:1.6;color:#475569;font-weight:600;">Aranan ürün sisteme kayıtlı değildir veya henüz tanımlanmamıştır.</div>
          <div style="margin-top:18px;display:flex;gap:12px;flex-wrap:wrap;">
            <div style="padding:12px 16px;border-radius:16px;background:#92400e;color:#fff;font-size:17px;font-weight:900;">Barkod: <span data-bind="barcode" class="pv-barcode-truncate">—</span></div>
            <div style="padding:12px 16px;border-radius:16px;background:#fff;border:1px solid #e2e8f0;color:#334155;font-size:17px;font-weight:800;">Saat: <span data-bind="timestamp">--:--</span></div>
          </div>
        </div>
      </div>
    </div>
<script>
// PriceView data binding helper
// APK calls: window.PriceView.setProduct(jsonString)
// APK calls: window.PriceView.setCompany(name, branch)
// APK calls: window.PriceView.close()
window.PriceView = {
  setProduct: function(jsonStr) {
    try {
      var p = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
      document.querySelectorAll('[data-bind]').forEach(function(el) {
        var key = el.getAttribute('data-bind');
        var val = p[key];
        if (val !== undefined && val !== null && val !== '') {
          el.textContent = val;
        }
      });
      // Handle branch_name visibility
      var bnEl = document.querySelector('[data-bind="branch_name"]');
      var dotEl = bnEl ? bnEl.previousElementSibling : null;
      if (bnEl) {
        var bVal = bnEl.textContent.trim();
        if (!bVal || bVal === '' || bVal === 'Şube Adı') {
          bnEl.style.display = 'none';
          if (dotEl && dotEl.textContent.trim() === '•') dotEl.style.display = 'none';
        } else {
          bnEl.style.display = '';
          if (dotEl && dotEl.textContent.trim() === '•') dotEl.style.display = '';
        }
      }
    // Update timestamp on product set
      var tsEl = document.querySelector('[data-bind="timestamp"]');
      if(tsEl) {
        var now = new Date();
        tsEl.textContent = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
      }
    } catch(e) { console.error('PriceView.setProduct error:', e); }
  },
  setCompany: function(companyName, branchName) {
    var cn = document.querySelector('[data-bind="company_name"]');
    var bn = document.querySelector('[data-bind="branch_name"]');
    var dot = cn ? cn.nextElementSibling : null;
    if (cn) cn.textContent = companyName || '';
    if (bn) {
      bn.textContent = branchName || '';
      if (!branchName && dot) dot.style.display = 'none';
      if (!branchName) bn.style.display = 'none';
    }
  },
  close: function() {
    var btn = document.querySelector('[title="Kapat"]');
    if (btn) btn.click();
  },
  setTimestamp: function() {
    var ts = document.querySelector('[data-bind="timestamp"]');
    if (ts) {
      var now = new Date();
      ts.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }
  }
};
// Auto-set timestamp on load
document.addEventListener('DOMContentLoaded', function() { window.PriceView.setTimestamp(); });
</script>
</body>
</html>
