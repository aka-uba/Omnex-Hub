<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PriceView - Depo / Raf - Urun Goruntuleme</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { font-family:Arial,Helvetica,sans-serif; background:transparent !important; background-color:transparent !important; padding:12px !important;  }
  /* Mobile responsive */
  @media (max-width:768px) {
    .pv-card { padding:10px !important; }
    .pv-card-inner { padding:14px !important; gap:14px !important; }
    .pv-img-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-text-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-price { font-size:48px !important; }
    .pv-title { font-size:28px !important; }
    .pv-grid-bottom { grid-template-columns:1fr !important; }
  }
  @media (max-width:480px) {
    .pv-price { font-size:38px !important; }
    .pv-title { font-size:24px !important; }
  }
  /* pv-missing-image-fallback */
  .pv-missing-image-wrap{display:none;align-items:center;justify-content:center;flex:0.8 1 240px;width:100%;height:100%;min-height:180px}
  .pv-missing-image-wrap.active{display:flex}
  .pv-missing-image-dot{
    width:180px;height:180px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:90px;line-height:1;color:#1f2937;
    box-shadow:0 10px 28px rgba(15,23,42,.18) inset,0 6px 14px rgba(15,23,42,.10)
  }
</style>
</head>
<body>
<div class="pv-card" style="position:relative;display:block;border-radius:28px;padding:16px;background:linear-gradient(145deg,#0f172a 0%,#334155 100%);box-shadow:0 20px 48px rgba(0,0,0,.35);">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
                <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;"><span data-bind="company_name" style="font-size:26px;font-weight:900;color:#fff;">Firma Adı</span><span style="color:rgba(255,255,255,.25);font-size:18px;font-weight:300;">•</span><span data-bind="branch_name" style="font-size:20px;font-weight:700;color:rgba(255,255,255,.55);">Şube Adı</span></div>
                <button onclick="event.stopPropagation()" title="Kapat" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:rgba(255,255,255,.65);font-size:18px;font-weight:700;line-height:1;flex-shrink:0;">&#10005;</button>
              </div>
              <div class="pv-card-inner" style="display:flex;gap:20px;flex-wrap:wrap;min-height:320px;border-radius:28px;padding:24px;background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);">
                <div style="flex:1 1 260px;min-width:240px;display:flex;align-items:center;justify-content:center;">
                  <div style="width:220px;height:240px;border-radius:28px;background:linear-gradient(180deg,#e2e8f0,#cbd5e1);display:flex;align-items:center;justify-content:center;font-size:100px;">📦</div>
                </div>
                <div class="pv-text-area" class="pv-text-area" style="flex:1.35 1 520px;min-width:300px;display:flex;flex-direction:column;justify-content:space-between;gap:18px">
                  <div>
                    <div style="display:inline-block;padding:10px 14px;border-radius:999px;background:#334155;color:#fff;font-size:13px;font-weight:900;">Lojistik Etiketi</div>
                    <div data-bind="brand" style="margin-top:16px;font-size:16px;font-weight:800;letter-spacing:1.4px;color:#475569;text-transform:uppercase;"></div>
                    <div data-bind="name" style="margin-top:8px;font-size:38px;line-height:1.05;font-weight:900;color:#0f172a;"></div>
                    <div data-bind="description" style="margin-top:12px;font-size:20px;font-weight:700;color:#475569;"></div>
                  </div>
                  <div class="pv-grid-bottom" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
                    <div style="padding:14px;border-radius:16px;background:#fff;border:1px solid #cbd5e1;">
                      <div style="font-size:12px;font-weight:800;letter-spacing:1.4px;color:#64748b;text-transform:uppercase;">Stok</div>
                      <div data-bind="current_price" style="margin-top:8px;font-size:28px;font-weight:900;color:#0f172a;"></div>
                    </div>
                    <div style="padding:14px;border-radius:16px;background:#0f172a;color:#fff;">
                      <div style="font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;">Barkod</div>
                      <div data-bind="barcode" style="margin-top:8px;font-size:22px;font-weight:900;letter-spacing:2px;"></div>
                    </div>
                  </div>
                </div>
              </div>
            
              <div style="display:flex;justify-content:center;margin-top:12px;"><button onclick="printSection('card-warehouse')" style="border:none;cursor:pointer;padding:12px 16px;border-radius:14px;background:#fff;color:#334155;font-size:14px;font-weight:900;min-width:180px;text-align:center;">Yazdır</button></div>
            </div>
<script>
// PriceView data binding helper
// APK calls: window.PriceView.setProduct(jsonString)
// APK calls: window.PriceView.setCompany(name, branch)
// APK calls: window.PriceView.close()
window.PriceView = {
  setProduct: function(jsonStr) {
    try {
      var p = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
      document.querySelectorAll('[data-bind]').forEach(function(el) {
        var key = el.getAttribute('data-bind');
        var val = p[key];
        if (val === undefined || val === null) return;
        if (el.tagName === 'IMG') {
          if (val && val.trim()) {
            el.src = val;
            el.style.display = 'block';
            el.onerror = function() {
              this.style.display = 'none';
              var fb = document.querySelector('.pv-img-fallback');
              if (fb) fb.style.display = 'flex';
            };
            var fb = document.querySelector('.pv-img-fallback');
            if (fb) fb.style.display = 'none';
          } else {
            el.style.display = 'none';
            var fb = document.querySelector('.pv-img-fallback');
            if (fb) fb.style.display = 'flex';
          }
        } else {
          el.textContent = val;
        }
      });
    } catch(e) { console.error('PriceView.setProduct error:', e); }
  },
  setCompany: function(companyName, branchName) {
    var cn = document.querySelector('[data-bind="company_name"]');
    var bn = document.querySelector('[data-bind="branch_name"]');
    var dot = cn ? cn.nextElementSibling : null;
    if (cn) cn.textContent = companyName || '';
    if (bn) {
      bn.textContent = branchName || '';
      if (!branchName && dot) dot.style.display = 'none';
      if (!branchName) bn.style.display = 'none';
    }
  },
  close: function() {
    var btn = document.querySelector('[title="Kapat"]');
    if (btn) btn.click();
  },
  setTimestamp: function() {
    var ts = document.querySelector('[data-bind="timestamp"]');
    if (ts) {
      var now = new Date();
      ts.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }
  }
};
/* pv_template_motion_fix_v2 */
(function(){
  if(window.__pvTemplateMotionFixV2){ return; }
  window.__pvTemplateMotionFixV2 = true;

  function parseRgb(raw){
    if(!raw){ return null; }
    var m = String(raw).match(/rgba?\((\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if(!m){ return null; }
    return { r:parseInt(m[1],10), g:parseInt(m[2],10), b:parseInt(m[3],10) };
  }
  function toRgb(c){ return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')'; }
  function mix(base, target, ratio){
    return {
      r: Math.round(base.r + (target.r - base.r) * ratio),
      g: Math.round(base.g + (target.g - base.g) * ratio),
      b: Math.round(base.b + (target.b - base.b) * ratio)
    };
  }
  function resolveThemeColor(node){
    var cur = node;
    while(cur && cur !== document.body){
      var bg = parseRgb(window.getComputedStyle(cur).backgroundColor);
      if(bg){ return bg; }
      cur = cur.parentElement;
    }
    return parseRgb(window.getComputedStyle(document.body).backgroundColor) || {r:254,g:215,b:170};
  }
  function ensureFallback(img){
    var parent = img && img.parentElement;
    if(!parent){ return null; }
    var existing = parent.querySelector(':scope > .pv-missing-image-wrap');
    if(existing){ return existing; }
    var wrap = document.createElement('div');
    wrap.className = 'pv-missing-image-wrap';
    var dot = document.createElement('div');
    dot.className = 'pv-missing-image-dot';
    dot.innerHTML = '&#128269;';
    wrap.appendChild(dot);
    parent.appendChild(wrap);
    return wrap;
  }
  function updateFallbackColor(img, wrap){
    if(!wrap){ return; }
    var dot = wrap.querySelector('.pv-missing-image-dot');
    if(!dot){ return; }
    var theme = resolveThemeColor(img);
    var c1 = mix(theme, {r:255,g:255,b:255}, 0.30);
    var c2 = mix(theme, {r:255,g:255,b:255}, 0.62);
    dot.style.background = 'radial-gradient(circle,' + toRgb(c1) + ' 0%,' + toRgb(c2) + ' 60%)';
  }
  function isBadSrc(src){
    var v = (src || '').trim().toLowerCase();
    return !v || v === 'null' || v === 'undefined' || v === 'about:blank';
  }
  function showFallback(img){
    var wrap = ensureFallback(img);
    if(!wrap){ return; }
    updateFallbackColor(img, wrap);
    wrap.classList.add('active');
    img.style.display = 'none';
    img.style.visibility = 'hidden';
  }
  function showImage(img){
    var parent = img.parentElement;
    if(parent){
      var wrap = parent.querySelector(':scope > .pv-missing-image-wrap');
      if(wrap){ wrap.classList.remove('active'); }
    }
    img.style.display = 'block';
    img.style.visibility = 'visible';
  }
  function refreshImage(img){
    if(!img){ return; }
    var src = img.getAttribute('src') || '';
    if(isBadSrc(src)){ showFallback(img); return; }
    if(img.complete){
      if((img.naturalWidth || 0) > 0){ showImage(img); }
      else { showFallback(img); }
    }
  }
  function bindImage(img){
    if(!img || img.dataset.pvMissingBound === '1'){ return; }
    img.dataset.pvMissingBound = '1';
    img.addEventListener('error', function(){ showFallback(img); }, { passive:true });
    img.addEventListener('load', function(){
      if((img.naturalWidth || 0) > 0){ showImage(img); }
      else { showFallback(img); }
    }, { passive:true });
    var obs = new MutationObserver(function(){ refreshImage(img); });
    obs.observe(img, { attributes:true, attributeFilter:['src','style'] });
    refreshImage(img);
  }
  function applyAll(){
    document.querySelectorAll('img[data-bind="image_url"], img[data-image-bind="image_url"]').forEach(bindImage);
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', applyAll, { once:true });
  } else {
    applyAll();
  }
  var originalSetProduct = window.PriceView && window.PriceView.setProduct;
  if(typeof originalSetProduct === 'function'){
    window.PriceView.setProduct = function(jsonStr){
      originalSetProduct.call(window.PriceView, jsonStr);
      applyAll();
    };
  }
})();
// Auto-set timestamp on load
document.addEventListener('DOMContentLoaded', function() { window.PriceView.setTimestamp(); });
</script>
</body>
</html>
