<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PriceView - Beyaz Esya - Urun Goruntuleme</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { font-family:'Roboto',Arial,Helvetica,sans-serif; background:transparent !important; background-color:transparent !important; padding:0 !important;  }
  /* Mobile responsive */
  /* Mobile responsive - comprehensive */
  @media (max-width:768px) {
    .pv-card { padding:14px !important; }
    .pv-card-inner { padding:20px !important; gap:12px !important; }
    .pv-img-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-text-area { min-width:0 !important; flex-basis:100% !important; }
    .pv-price { font-size:42px !important; }
    .pv-title { font-size:26px !important; }
    .pv-grid-bottom { grid-template-columns:1fr !important; }
    /* Description */
    [data-bind="description"] { font-size:15px !important; }
    /* Brand */
    [data-bind="brand"] { font-size:13px !important; }
    /* Barcode */
    [data-bind="barcode"] { font-size:17px !important; letter-spacing:1px !important; }
    /* Badge pills */
    [style*="border-radius:999px"] { font-size:11px !important; padding:7px 10px !important; }
    /* KDV, Vadeli pills */
    [style*="border-radius:14px"] { font-size:13px !important; padding:7px 10px !important; }
    /* Old price */
    [data-bind="previous_price"] { font-size:17px !important; }
    /* Currency symbol */
    [style*="font-size:26px"][style*="font-weight:800"] { font-size:20px !important; }
    /* Header company/branch */
    [data-bind="company_name"] { font-size:20px !important; }
    [data-bind="branch_name"] { font-size:15px !important; }
    /* Barcode label */
    [style*="letter-spacing:1.4px"][style*="text-transform:uppercase"] { font-size:10px !important; }
    /* Close button */
    [title="Kapat"] { width:30px !important; height:30px !important; font-size:14px !important; }
    /* Fallback icon */
    .pv-missing-image-dot { width:160px !important; height:160px !important; font-size:80px !important; }
    /* Print button */
    [onclick*="printSection"] { font-size:12px !important; padding:10px 14px !important; min-width:140px !important; }
    /* Grid info boxes */
    .pv-grid-bottom > div { padding:10px !important; }
    .pv-grid-bottom [style*="font-size:22px"] { font-size:17px !important; }
  }
  @media (max-width:480px) {
    .pv-card { padding:14px !important; }
    .pv-card-inner { padding:16px !important; gap:10px !important; }
    .pv-price { font-size:32px !important; }
    .pv-title { font-size:22px !important; }
    [data-bind="description"] { font-size:13px !important; }
    [data-bind="brand"] { font-size:11px !important; }
    [data-bind="barcode"] { font-size:15px !important; }
    [data-bind="previous_price"] { font-size:14px !important; }
    [data-bind="company_name"] { font-size:16px !important; }
    [data-bind="branch_name"] { font-size:12px !important; }
    [style*="border-radius:14px"] { font-size:11px !important; padding:6px 8px !important; }
    [style*="font-size:26px"][style*="font-weight:800"] { font-size:16px !important; }
    .pv-missing-image-dot { width:120px !important; height:120px !important; font-size:60px !important; }
    /* Not-found heading */
    [style*="font-size:42px"] { font-size:26px !important; }
    [style*="font-size:44px"] { font-size:26px !important; }
    /* Not-found description */
    [style*="font-size:20px"][style*="font-weight:600"] { font-size:14px !important; }
    /* Info card emoji */
    [style*="font-size:110px"] { font-size:70px !important; }
    [style*="font-size:100px"] { font-size:60px !important; }
    [style*="font-size:108px"] { font-size:70px !important; }
    /* Prevent text overflow */
    .pv-card-inner { overflow:hidden !important; word-break:break-word !important; }
  }
  @media (max-width:360px) {
    .pv-price { font-size:28px !important; }
    .pv-title { font-size:18px !important; }
    [data-bind="company_name"] { font-size:14px !important; }
    [data-bind="branch_name"] { font-size:11px !important; }
    [data-bind="description"] { font-size:12px !important; }
  }
  /* pv-missing-image-fallback */
  .pv-missing-image-wrap{display:none;align-items:center;justify-content:center;flex:0.8 1 240px;width:100%;min-height:220px;position:relative;z-index:5}
  .pv-missing-image-wrap.active{display:flex}
  .pv-missing-image-dot{width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#7dd3fc 0%,#bae6fd 48%,rgba(186,230,253,.2) 70%);display:flex;align-items:center;justify-content:center;font-size:108px;line-height:1}
</style>
</head>
<body>
<div class="pv-card" style="position:relative;display:block;border-radius:28px;padding:22px;background:linear-gradient(145deg,#1e3a5f 0%,#0f172a 100%);box-shadow:0 20px 48px rgba(0,0,0,.35);">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
                <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;"><span data-bind="company_name" style="font-size:26px;font-weight:900;color:#fff;">Firma Adı</span><span style="color:rgba(255,255,255,.25);font-size:18px;font-weight:300;">•</span><span data-bind="branch_name" style="font-size:20px;font-weight:700;color:rgba(255,255,255,.55);">Şube Adı</span></div>
                <button onclick="event.stopPropagation()" title="Kapat" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:rgba(255,255,255,.65);font-size:18px;font-weight:700;line-height:1;flex-shrink:0;">&#10005;</button>
              </div>
              <div class="pv-card-inner" style="display:flex;gap:20px;flex-wrap:wrap;border-radius:28px;padding:30px;background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 52%,#ffffff 100%);">
                <div class="pv-img-area" style="flex:1 1 300px;min-width:260px;position:relative;display:flex;justify-content:center;align-items:center;">
                  <div style="position:absolute;left:20px;right:20px;bottom:18px;height:60%;background:linear-gradient(180deg,#bae6fd,#7dd3fc);border-radius:28px;"></div>
                  <img data-bind="image_url" src="" alt="Ürün" style="position:relative;z-index:2;max-width:82%;max-height:290px;object-fit:contain;filter:drop-shadow(0 12px 20px rgba(0,0,0,.18))">
                </div>
                <div class="pv-text-area" class="pv-text-area" style="flex:1.25 1 480px;min-width:300px;display:flex;flex-direction:column;justify-content:space-between;gap:18px">
                  <div>
                    <div style="display:inline-block;padding:10px 14px;border-radius:999px;background:#0369a1;color:#fff;font-size:13px;font-weight:900;" data-i18n="badge_search">Arama Sonucu</div>
                    <div data-bind="brand" style="margin-top:16px;font-size:16px;font-weight:800;letter-spacing:1.4px;color:#0284c7;text-transform:uppercase;"></div>
                    <div class="pv-title" data-bind="name" style="margin-top:8px;font-size:42px;line-height:1.05;font-weight:900;color:#0c4a6e;"></div>
                    <div data-bind="description" style="margin-top:12px;font-size:20px;font-weight:700;color:#475569;"></div>
                    <div style="margin-top:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                      <div data-bind="current_price" style="font-size:72px;" class="pv-priceline-height:.92;font-weight:900;color:#075985;"></div>
                      <div style="font-size:26px;font-weight:800;color:#0ea5e9;padding-bottom:8px;">₺</div>
                    </div>
                    <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
                      <div><span data-bind="previous_price" style="font-size:22px;font-weight:700;color:#94a3b8;text-decoration:line-through;"></span> <span style="font-size:22px;color:#94a3b8;">₺</span></div>
                      <div style="padding:10px 15px;border-radius:14px;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;font-size:17px;font-weight:900;">Vadeli <span data-bind="installment_price"></span> ₺</div>
                      <div style="padding:10px 15px;border-radius:14px;background:#0c4a6e;color:#fff;font-size:17px;font-weight:900;">KDV %<span data-bind="vat_rate"></span></div>
                    </div>
                  </div>
                  <div class="pv-grid-bottom" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div style="padding:14px;border-radius:16px;background:#fff;border:1px solid #bae6fd;">
                      <div style="font-size:12px;font-weight:800;letter-spacing:1.4px;color:#64748b;text-transform:uppercase;">Barkod</div>
                      <div data-bind="barcode" style="margin-top:8px;font-size:22px;font-weight:900;letter-spacing:2px;color:#0c4a6e;"></div>
                    </div>
                    <div style="padding:14px;border-radius:16px;background:#075985;color:#fff;">
                      <div style="font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;">Garanti</div>
                      <div style="margin-top:8px;font-size:22px;font-weight:900;">2 Yıl</div>
                    </div>
                  </div>
                </div>
              </div>
            
              <div style="display:flex;justify-content:center;margin-top:12px;"><button onclick="printSection('card-whitegoods')" style="border:none;cursor:pointer;padding:12px 16px;border-radius:14px;background:#fff;color:#1e3a5f;font-size:14px;font-weight:900;min-width:180px;text-align:center;">Yazdır</button></div></div>
<script>
// PriceView data binding helper
// APK calls: window.PriceView.setProduct(jsonString)
// APK calls: window.PriceView.setCompany(name, branch)
// APK calls: window.PriceView.close()
window.PriceView = {
  setProduct: function(jsonStr) {
    try {
      var p = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
      document.querySelectorAll('[data-bind]').forEach(function(el) {
        var key = el.getAttribute('data-bind');
        var val = p[key];
        if (val === undefined || val === null) return;
        if (el.tagName === 'IMG') {
          el.src = val;
          el.style.display = val ? 'block' : 'none';
        } else {
          el.textContent = val;
        }
      });
      // Handle branch_name visibility
      var bnEl = document.querySelector('[data-bind="branch_name"]');
      var dotEl = bnEl ? bnEl.previousElementSibling : null;
      if (bnEl) {
        var bVal = bnEl.textContent.trim();
        if (!bVal || bVal === '' || bVal === 'Şube Adı') {
          bnEl.style.display = 'none';
          if (dotEl && dotEl.textContent.trim() === '•') dotEl.style.display = 'none';
        } else {
          bnEl.style.display = '';
          if (dotEl && dotEl.textContent.trim() === '•') dotEl.style.display = '';
        }
      }
    } catch(e) { console.error('PriceView.setProduct error:', e); }
  },
  setCompany: function(companyName, branchName) {
    var cn = document.querySelector('[data-bind="company_name"]');
    var bn = document.querySelector('[data-bind="branch_name"]');
    var dot = cn ? cn.nextElementSibling : null;
    if (cn) cn.textContent = companyName || '';
    if (bn) {
      bn.textContent = branchName || '';
      if (!branchName && dot) dot.style.display = 'none';
      if (!branchName) bn.style.display = 'none';
    }
  },
  close: function() {
    var btn = document.querySelector('[title="Kapat"]');
    if (btn) btn.click();
  },
  setTimestamp: function() {
    var ts = document.querySelector('[data-bind="timestamp"]');
    if (ts) {
      var now = new Date();
      ts.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }
  }
};
/* pv_template_motion_fix_v2 */
(function(){
  if(window.__pvTemplateMotionFixV2){ return; }
  window.__pvTemplateMotionFixV2 = true;


  function isBadSrc(src){
    var v = (src || '').trim().toLowerCase();
    return !v || v === 'null' || v === 'undefined' || v === 'about:blank';
  }
  function ensureFallback(img){
    var parent = img && img.parentElement;
    if(!parent){ return null; }
    var existing = parent.querySelector(':scope > .pv-missing-image-wrap');
    if(existing){ return existing; }
    var wrap = document.createElement('div');
    wrap.className = 'pv-missing-image-wrap';
    var dot = document.createElement('div');
    dot.className = 'pv-missing-image-dot';
    dot.textContent = '🔎';
    wrap.appendChild(dot);
    parent.appendChild(wrap);
    return wrap;
  }
  function showFallback(img){
    var wrap = ensureFallback(img);
    if(!wrap){ return; }
    wrap.classList.add('active');
    img.style.display = 'none';
    img.style.visibility = 'hidden';
  }
  function showImage(img){
    var parent = img.parentElement;
    if(parent){
      var wrap = parent.querySelector(':scope > .pv-missing-image-wrap');
      if(wrap){ wrap.classList.remove('active'); }
    }
    img.style.display = 'block';
    img.style.visibility = 'visible';
  }
  function refreshImage(img){
    if(!img){ return; }
    var src = img.getAttribute('src') || '';
    if(isBadSrc(src)){ showFallback(img); return; }
    if(img.complete){
      if((img.naturalWidth || 0) > 0){ showImage(img); }
      else { showFallback(img); }
    }
  }
  function bindImage(img){
    if(!img || img.dataset.pvMissingBound === '1'){ return; }
    img.dataset.pvMissingBound = '1';
    img.addEventListener('error', function(){ showFallback(img); }, { passive:true });
    img.addEventListener('load', function(){
      if((img.naturalWidth || 0) > 0){ showImage(img); }
      else { showFallback(img); }
    }, { passive:true });
    var obs = new MutationObserver(function(){ refreshImage(img); });
    obs.observe(img, { attributes:true, attributeFilter:['src','style'] });
    refreshImage(img);
  }
  function applyAll(){
    document.querySelectorAll('img[data-bind="image_url"], img[data-image-bind="image_url"]').forEach(bindImage);
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', applyAll, { once:true });
  } else {
    applyAll();
  }
  var originalSetProduct = window.PriceView && window.PriceView.setProduct;
  if(typeof originalSetProduct === 'function'){
    window.PriceView.setProduct = function(jsonStr){
      originalSetProduct.call(window.PriceView, jsonStr);
      applyAll();
    };
  }
})();
// Auto-set timestamp on load
document.addEventListener('DOMContentLoaded', function() { window.PriceView.setTimestamp(); });
</script>
</body>
</html>
