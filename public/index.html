    <link rel="modulepreload" href="assets/js/app.js?v=1.0.56">

    <!-- OMNEX_CONFIG_START -->
    <script id="omnex-config">
    (function() {
        // If already injected by PHP, skip
        if (window.OmnexConfig && window.OmnexConfig._phpInjected) {
            return;
        }

        // Client-side detection
        var origin = window.location.origin;
        var fullPath = window.location.pathname;

        // Clean up pathname (remove query, hash, index.html)
        fullPath = fullPath.split('?')[0].split('#')[0];
        fullPath = fullPath.replace(/\/index\.(html|php)$/i, '');
        fullPath = fullPath.replace(/\/$/, ''); // Remove trailing slash

        // Method 1: Check for script's own path to determine basePath
        var scripts = document.getElementsByTagName('script');
        var basePath = '';

        for (var i = 0; i < scripts.length; i++) {
            var src = scripts[i].src || '';
            var match = src.match(/(.*)\/assets\/js\/app\.js/);
            if (match) {
                var scriptPath = new URL(match[1], origin).pathname;
                basePath = scriptPath.replace(/\/$/, '');
                break;
            }
        }

        // Method 2: If script method failed, use pathname directly
        // This works when accessing /signage/ or /signage/index.html
        if (!basePath && fullPath) {
            // The pathname IS the basePath when no hash routing is used yet
            basePath = fullPath;
        }

        // Method 3: Check link tags for CSS paths
        if (!basePath) {
            var links = document.getElementsByTagName('link');
            for (var j = 0; j < links.length; j++) {
                var href = links[j].href || '';
                var cssMatch = href.match(/(.*)\/assets\/css\//);
                if (cssMatch) {
                    var cssPath = new URL(cssMatch[1], origin).pathname;
                    basePath = cssPath.replace(/\/$/, '');
                    break;
                }
            }
        }

        // Clean up basePath
        basePath = basePath.replace(/\/+/g, '/').replace(/\/$/, '');

        var apiUrl = origin + basePath + '/api';

        window.OmnexConfig = {
            _phpInjected: false,
            appName: 'Omnex Display Hub',
            appVersion: '1.0.0',
            apiUrl: apiUrl,
            basePath: basePath,
            defaultLanguage: 'tr',
            supportedLanguages: ['tr', 'en', 'ar'],
            rtlLanguages: ['ar'],
            storageKeys: {
                token: 'omnex_token',
                refreshToken: 'omnex_refresh_token',
                user: 'omnex_user',
                layout: 'omnex_layout_config',
                theme: 'omnex_theme',
                language: 'omnex_language'
            }
        };
    })();
    </script>
    <!-- OMNEX_CONFIG_END -->
</head>

<body class="bg-secondary text-primary antialiased">
    <!-- App Root -->
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-primary">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 mb-4">
                    <svg class="animate-spin w-10 h-10 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-semibold text-primary">Omnex Display Hub</h2>
                <p class="text-sm text-muted mt-1">Yükleniyor...</p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container bottom-right"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Early initialization -->
    <script>
        // Theme detection - Use omnex-layout-config-v2 as primary source
        (function() {
            var theme = 'light';
            try {
                var layoutConfig = localStorage.getItem('omnex-layout-config-v2');
                if (layoutConfig) {
                    var parsed = JSON.parse(layoutConfig);
                    if (parsed.themeMode) {
                        theme = parsed.themeMode;
                    }
                }
            } catch (e) {}
            if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.documentElement.dataset.theme = 'dark';
            }
        })();

        // Modal cleanup
        (function() {
            var modals = document.querySelectorAll('.modal-overlay');
            for (var i = 0; i < modals.length; i++) modals[i].remove();
            document.body.classList.remove('modal-open');
        })();
    </script>

    <script type="module" src="assets/js/app.js?v=1.0.56"></script>

    <!-- Service Worker -->
    <script>
        (function() {
            if (!('serviceWorker' in navigator)) return;

            // Detect development mode
            var hostname = window.location.hostname;
            var isDev = hostname === 'localhost' ||
                        hostname === '127.0.0.1' ||
                        hostname.startsWith('192.168.') ||
                        hostname.startsWith('10.') ||
                        hostname.endsWith('.local');

            if (isDev) {
                // Development: Unregister any existing SW to avoid cache issues
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    registrations.forEach(function(registration) {
                        registration.unregister();
                        console.log('[SW] Unregistered for development');
                    });
                });
            } else {
                // Production: Register service worker
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('./sw.js', { scope: './' })
                        .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
                        .catch(function(err) { console.warn('[SW] Failed:', err); });
                });
            }
        })();
    </script>
</body>
